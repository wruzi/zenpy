<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — ZenPy</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/animations.css">
</head>
<body>
    <nav class="nav-header">
        <a href="/" class="nav-logo">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FF1493" stroke-width="2.5"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
            Zen<span>Py</span>
        </a>
        <div class="nav-links">
            <a href="/login" class="btn btn-ghost btn-sm">Login</a>
        </div>
    </nav>

    <div class="auth-page">
        <div class="auth-card animate-fadeInUp">
            <h2>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" style="vertical-align:middle;margin-right:6px;"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
                Reset Password
            </h2>
            <p class="subtitle">Enter your email to receive a recovery code.</p>

            <div id="errorMsg" class="form-error hidden mb-2"></div>
            <div id="successMsg" class="hidden mb-2" style="color:var(--success);font-size:0.85rem;padding:8px 12px;border:2px solid var(--success);"></div>

            <form id="forgotForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" class="form-control" placeholder="your email address" required>
                </div>
                <button type="submit" class="btn btn-primary w-full">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                    Send Request
                </button>
            </form>

            <!-- Reset Section -->
            <div id="resetSection" class="hidden">
                <div style="border:2px solid var(--warning);padding:16px;margin-bottom:16px;">
                    <p style="font-size:0.82rem;color:var(--text-muted);margin-bottom:8px;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--warning)" stroke-width="2" style="vertical-align:middle;margin-right:4px;"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                        Your Reset Code:
                    </p>
                    <code id="otpDisplay" style="font-size:1.5rem;font-weight:800;color:var(--warning);letter-spacing:0.3em;"></code>
                </div>

                <form id="resetForm">
                    <div class="form-group">
                        <label>4-Digit Code</label>
                        <input type="text" id="otp" class="form-control" placeholder="4-digit code" required maxlength="4">
                    </div>
                    <div class="form-group">
                        <label>New Password</label>
                        <input type="password" id="newPassword" class="form-control" placeholder="minimum 6 characters" required minlength="6">
                    </div>
                    <div class="form-group">
                        <label>Confirm New Password</label>
                        <input type="password" id="confirmNewPassword" class="form-control" placeholder="repeat password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-full">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                        Reset Password
                    </button>
                </form>
            </div>

            <p class="form-footer">
                Remember your password? <a href="/login">Login</a>
            </p>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>
    <script src="/js/utils.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
