<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat — ZenPy</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/animations.css">
    <style>
        .chat-layout { display: flex; height: 100vh; }
        .chat-sidebar {
            width: 220px; background: var(--bg-secondary);
            border-right: 2px solid var(--border); display: flex; flex-direction: column; padding: 16px;
        }
        .chat-main { flex: 1; display: flex; flex-direction: column; }
        .chat-header {
            padding: 14px 20px; border-bottom: 2px solid var(--border); background: var(--bg-secondary);
            display: flex; justify-content: space-between; align-items: center;
        }
        .chat-header h3 { font-size: 0.95rem; display: flex; align-items: center; gap: 8px; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 16px 20px; }
        .chat-msg { display: flex; gap: 10px; margin-bottom: 12px; padding: 8px; transition: var(--transition); }
        .chat-msg:hover { background: var(--bg-hover); }
        .msg-avatar { width: 36px; height: 36px; flex-shrink: 0; border: 1px solid var(--border); overflow: hidden; }
        .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .msg-header { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; }
        .msg-username { font-weight: 700; font-size: 0.85rem; }
        .msg-title { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
        .msg-time { font-size: 0.72rem; color: var(--text-muted); }
        .msg-text { font-size: 0.88rem; color: var(--text-secondary); line-height: 1.6; }
        .mention { color: var(--accent); font-weight: 600; }
        .system-msg { justify-content: center; padding: 4px; }
        .system-msg .msg-text { font-size: 0.78rem; color: var(--text-muted); font-style: italic; }
        .chat-input-area {
            padding: 12px 20px; border-top: 2px solid var(--border); background: var(--bg-secondary);
            display: flex; gap: 8px; align-items: center;
        }
        .chat-input-area input {
            flex: 1; padding: 10px 14px; background: var(--bg-primary); border: 2px solid var(--border);
            color: var(--text-primary); font-family: var(--font-main); font-size: 0.88rem;
        }
        .chat-input-area input:focus { border-color: var(--accent); outline: none; }
        .emoji-picker { position: relative; }
        .emoji-dropdown {
            display: none; position: absolute; bottom: 44px; right: 0;
            background: var(--bg-card); border: 2px solid var(--border); padding: 8px;
            box-shadow: var(--shadow-lg); width: 240px;
        }
        .emoji-dropdown.show { display: flex; flex-wrap: wrap; gap: 4px; }
        .emoji-btn {
            width: 32px; height: 32px; border: 1px solid var(--border); background: transparent;
            font-size: 1.1rem; display: flex; align-items: center; justify-content: center;
            transition: var(--transition);
        }
        .emoji-btn:hover { border-color: var(--accent); background: var(--accent-dim); }
        #typingIndicator { font-size: 0.78rem; color: var(--text-muted); min-height: 18px; padding: 0 20px; }
        @media (max-width: 768px) { .chat-sidebar { display: none; } }
    </style>
</head>
<body>
    <div class="chat-layout">
        <!-- Sidebar -->
        <div class="chat-sidebar">
            <a href="/dashboard" class="btn btn-ghost btn-sm mb-2">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                Dashboard
            </a>
            <h4 style="font-size:0.78rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-muted); margin-bottom:8px;">Global Chat</h4>
            <p class="text-sm text-muted" style="line-height:1.6;">
                Talk with fellow coders. Be respectful. No links allowed. Anti-spam enabled.
            </p>
            <div class="mt-3" style="font-size:0.82rem;">
                <div class="d-flex align-center gap-1 text-muted">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
                    <span id="onlineCount">0 online</span>
                </div>
            </div>
        </div>

        <!-- Main Chat -->
        <div class="chat-main">
            <div class="chat-header">
                <h3>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
                    ZenPy Chat
                </h3>
                <span class="text-muted text-sm d-flex align-center gap-1">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    Moderated
                </span>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div id="typingIndicator"></div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Type a message..." maxlength="500" autocomplete="off">
                <div class="emoji-picker">
                    <button class="btn btn-ghost btn-sm" onclick="toggleEmojis()" title="Emoji">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
                    </button>
                    <div class="emoji-dropdown" id="emojiDropdown">
                        <button class="emoji-btn" onclick="addEmoji('😊')">😊</button>
                        <button class="emoji-btn" onclick="addEmoji('😂')">😂</button>
                        <button class="emoji-btn" onclick="addEmoji('🔥')">🔥</button>
                        <button class="emoji-btn" onclick="addEmoji('💯')">💯</button>
                        <button class="emoji-btn" onclick="addEmoji('👏')">👏</button>
                        <button class="emoji-btn" onclick="addEmoji('🎉')">🎉</button>
                        <button class="emoji-btn" onclick="addEmoji('❤️')">❤️</button>
                        <button class="emoji-btn" onclick="addEmoji('👍')">👍</button>
                        <button class="emoji-btn" onclick="addEmoji('🤔')">🤔</button>
                        <button class="emoji-btn" onclick="addEmoji('😎')">😎</button>
                        <button class="emoji-btn" onclick="addEmoji('🐍')">🐍</button>
                        <button class="emoji-btn" onclick="addEmoji('💻')">💻</button>
                    </div>
                </div>
                <button class="btn btn-primary btn-sm" onclick="sendMessage()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/icons.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/chat.js"></script>
</body>
</html>
