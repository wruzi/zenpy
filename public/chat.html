<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat — ZenPy</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/animations.css">
    <style>
        .chat-layout { display: flex; height: 100vh; }
        .chat-sidebar {
            width: 220px; background: var(--bg-secondary);
            border-right: 2px solid var(--border); display: flex; flex-direction: column; padding: 16px;
        }
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at top right, rgba(30, 144, 255, 0.08), transparent 30%), var(--bg-primary);
        }
        .chat-header {
            padding: 14px 20px; border-bottom: 2px solid var(--border); background: var(--bg-secondary);
            display: flex; justify-content: space-between; align-items: center;
        }
        .chat-header h3 { font-size: 0.95rem; display: flex; align-items: center; gap: 8px; }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            background: linear-gradient(180deg, rgba(14, 20, 34, 0.65), rgba(8, 12, 22, 0.65));
        }
        .chat-msg {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            padding: 0;
            border-radius: 0;
            background: transparent;
            transition: var(--transition);
            animation: msg-in 0.2s ease;
        }
        .chat-msg:hover { transform: translateY(-1px); }
        .chat-msg.me,
        .chat-msg.other { background: transparent; }
        .msg-avatar {
            width: 36px;
            height: 36px;
            flex-shrink: 0;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: none;
        }
        .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .msg-content { flex: 1; }
        .msg-banner {
            width: 100%; height: 10px; border: 1px solid var(--border);
            margin-bottom: 6px; border-radius: 4px;
            background: rgba(126,243,255,0.08);
        }
        .msg-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 4px; }
        .msg-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .msg-username { font-weight: 700; font-size: 0.85rem; }
        .msg-username.mention-target { cursor: pointer; transition: var(--transition); }
        .msg-username.mention-target:hover { color: var(--accent); }
        .msg-title { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
        .msg-time { font-size: 0.72rem; color: var(--text-muted); }
        .msg-text {
            font-size: 0.88rem;
            color: #ffffff;
            line-height: 1.5;
            background: #050509;
            border: none;
            border-radius: 0;
            padding: 7px 9px;
            box-shadow: none;
            text-shadow: none;
            display: inline-block;
            width: fit-content;
            max-width: 100%;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .msg-copy-btn {
            opacity: 0;
            transform: translateY(2px);
            background: transparent;
            border: none;
            color: var(--text-muted);
            width: 20px;
            height: 20px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }
        .chat-msg:hover .msg-copy-btn { opacity: 1; transform: translateY(0); }
        .msg-copy-btn:hover { color: var(--accent); }
        .msg-content.chat-neon,
        .msg-content.chat-terminal,
        .msg-content.chat-royal {
            border: none !important;
            box-shadow: none !important;
            background: transparent !important;
        }
        .mention { color: var(--accent); font-weight: 600; }
        .system-msg { justify-content: center; padding: 4px; border-radius: 8px; }
        .system-msg .msg-text { font-size: 0.78rem; color: var(--text-muted); font-style: italic; }
        .chat-input-area {
            padding: 12px 20px; border-top: 2px solid var(--border); background: var(--bg-secondary);
            display: flex; gap: 8px; align-items: center;
        }
        .chat-input-area input {
            flex: 1; padding: 10px 14px; background: var(--bg-primary); border: 2px solid var(--border);
            color: var(--text-primary); font-family: var(--font-main); font-size: 0.88rem;
        }
        .chat-input-area input:focus { border-color: var(--accent); outline: none; }
        .emoji-picker { position: relative; }
        .emoji-dropdown {
            display: none; position: absolute; bottom: 44px; right: 0;
            background: var(--bg-card); border: 2px solid var(--border); padding: 8px;
            box-shadow: var(--shadow-lg); width: 240px;
            border-radius: 10px;
        }
        .emoji-dropdown.show { display: flex; flex-wrap: wrap; gap: 4px; }
        .emoji-btn {
            width: 32px; height: 32px; border: 1px solid var(--border); background: transparent;
            font-size: 1.1rem; display: flex; align-items: center; justify-content: center;
            transition: var(--transition);
        }
        .emoji-btn:hover { border-color: var(--accent); background: var(--accent-dim); }
        #typingIndicator { font-size: 0.78rem; color: var(--text-muted); min-height: 18px; padding: 0 20px; }
        @keyframes msg-in {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 768px) { .chat-sidebar { display: none; } }
    </style>
</head>
<body>
    <div class="chat-layout">
        <!-- Sidebar -->
        <div class="chat-sidebar">
            <a href="/dashboard" class="btn btn-ghost btn-sm mb-2"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
            <a href="/practice" class="btn btn-ghost btn-sm mb-2"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>Practice</a>
            <a href="/profile" class="btn btn-ghost btn-sm mb-2"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Profile</a>
            <a href="/leaderboard" class="btn btn-ghost btn-sm mb-2"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9H4a2 2 0 01-2-2V5a2 2 0 012-2h2m12 6h2a2 2 0 002-2V5a2 2 0 00-2-2h-2M9 22h6m-3-4v4m-4-8a4 4 0 004 4 4 4 0 004-4V3H8v11z"/></svg>Leaderboard</a>
            <a href="/shop" class="btn btn-ghost btn-sm mb-2"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>Shop</a>
            <a href="/chat" class="btn btn-ghost btn-sm mb-2" style="border-color:var(--accent);color:var(--accent);"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Chat</a>
            <a href="/community" class="btn btn-ghost btn-sm mb-2"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>Community</a>
            <a href="/docs" class="btn btn-ghost btn-sm mb-2"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="13" y2="17"/></svg>Python Docs</a>
            <a href="/rules" class="btn btn-ghost btn-sm mb-2"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="M9 12l2 2 4-4"/></svg>Rules</a>
            <h4 style="font-size:0.78rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-muted); margin-bottom:8px;">Global Chat</h4>
            <p class="text-sm text-muted" style="line-height:1.6;">
                Talk with fellow coders. Be respectful. No links allowed. Anti-spam enabled.
            </p>
            <div class="mt-3" style="font-size:0.82rem;">
                <div class="d-flex align-center gap-1 text-muted">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
                    <span id="onlineCount">0 online</span>
                </div>
            </div>
        </div>

        <!-- Main Chat -->
        <div class="chat-main">
            <div class="chat-header">
                <h3>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
                    ZenPy Chat
                </h3>
                <span class="text-muted text-sm d-flex align-center gap-1">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    Moderated
                </span>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div id="typingIndicator"></div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Type a message..." maxlength="500" autocomplete="off">
                <div class="emoji-picker">
                    <button class="btn btn-ghost btn-sm" onclick="toggleEmojis()" title="Emoji">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
                    </button>
                    <div class="emoji-dropdown" id="emojiDropdown">
                        <button class="emoji-btn" onclick="addEmoji('😊')">😊</button>
                        <button class="emoji-btn" onclick="addEmoji('😂')">😂</button>
                        <button class="emoji-btn" onclick="addEmoji('🔥')">🔥</button>
                        <button class="emoji-btn" onclick="addEmoji('💯')">💯</button>
                        <button class="emoji-btn" onclick="addEmoji('👏')">👏</button>
                        <button class="emoji-btn" onclick="addEmoji('🎉')">🎉</button>
                        <button class="emoji-btn" onclick="addEmoji('❤️')">❤️</button>
                        <button class="emoji-btn" onclick="addEmoji('👍')">👍</button>
                        <button class="emoji-btn" onclick="addEmoji('🤔')">🤔</button>
                        <button class="emoji-btn" onclick="addEmoji('😎')">😎</button>
                        <button class="emoji-btn" onclick="addEmoji('🐍')">🐍</button>
                        <button class="emoji-btn" onclick="addEmoji('💻')">💻</button>
                    </div>
                </div>
                <button class="btn btn-primary btn-sm" onclick="sendMessage()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/icons.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/chat.js"></script>
</body>
</html>
