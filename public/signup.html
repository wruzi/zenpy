<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — ZenPy</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/animations.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        .qr-box { text-align: center; padding: 20px; border: 2px solid var(--accent); margin: 16px 0; }
        .qr-box canvas { margin: 12px auto; display: block; }
        .session-code { font-size: 2.2rem; font-weight: 900; letter-spacing: 0.5em; color: var(--accent); font-family: 'JetBrains Mono', monospace; }
        .countdown { font-size: 0.85rem; color: var(--warning); margin-top: 8px; }
        .countdown.expired { color: var(--error); }
    </style>
</head>
<body>
    <nav class="nav-header">
        <a href="/" class="nav-logo">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FF1493" stroke-width="2.5"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
            Zen<span>Py</span>
        </a>
        <div class="nav-links">
            <a href="/login" class="btn btn-ghost btn-sm">Login</a>
        </div>
    </nav>

    <div class="auth-page">
        <div class="auth-card animate-fadeInUp">
            <h2>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" style="vertical-align:middle;margin-right:6px;"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                Create Account
            </h2>
            <p class="subtitle">Start your Python journey from Q1.</p>

            <div id="errorMsg" class="form-error hidden mb-2"></div>

            <form id="signupForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" class="form-control" placeholder="pick a username" required minlength="3" maxlength="20">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="form-control" placeholder="min 8 chars, 1 uppercase, 1 number" required minlength="8">
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPassword" class="form-control" placeholder="repeat password" required>
                </div>
                <button type="submit" id="signupBtn" class="btn btn-primary w-full">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    Create Account
                </button>
            </form>


            <p class="form-footer">
                Already have an account? <a href="/login">Login</a>
            </p>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>
    <script src="/js/utils.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
