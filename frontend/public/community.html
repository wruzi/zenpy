<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community — ZenPy</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/animations.css">
    <style>
        .community-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
        .user-card {
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            transition: transform 0.2s, box-shadow 0.2s;
            overflow: hidden;
            background: var(--bg-card);
            position: relative;
        }
        .profile-banner {
            width: calc(100% + 32px); height: 100px; margin: -16px -16px 12px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-primary);
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
        }
        .profile-modal-banner {
            width: 100%;
            height: 128px;
            margin: 0 0 10px;
            border-radius: 0;
            border: 1px solid var(--border);
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
        }
        .user-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
        .user-card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .user-card-avatar {
            width: 52px;
            height: 52px;
            border: 2px solid var(--accent);
            border-radius: 10px;
            overflow: hidden;
            flex-shrink: 0;
        }
        .user-card-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .user-card-name { font-weight: 700; font-size: 0.95rem; }
        .user-card-bio {
            font-size: 0.78rem;
            color: var(--text-secondary);
            margin-bottom: 10px;
            min-height: 42px;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px;
            background: var(--bg-primary);
        }
        .user-card-stats {
            display: grid;
            grid-template-columns: 1fr;
            gap: 6px;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 10px;
        }
        .user-card-stats span { display: flex; align-items: center; gap: 4px; }
        .user-card-links { display: flex; gap: 8px; margin-bottom: 10px; }
        .user-card-links a { color: var(--text-muted); transition: color 0.2s; }
        .user-card-links a:hover { color: var(--accent); }
        .user-card-actions { display: flex; gap: 8px; margin-top: 10px; }
        .follow-stats { display: flex; gap: 4px; font-size: 0.75rem; color: var(--text-muted); }
        /* DM Modal */
        .dm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; display: none; justify-content: center; align-items: center; }
        .dm-overlay.active { display: flex; }
        .dm-container { width: 500px; max-width: 95vw; height: 70vh; max-height: 600px; background: var(--bg-secondary); border: 2px solid var(--border); display: flex; flex-direction: column; }
        .dm-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
        .dm-header-avatar { width: 32px; height: 32px; border: 1px solid var(--accent); overflow: hidden; }
        .dm-header-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .dm-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
        .dm-msg { max-width: 75%; padding: 8px 12px; font-size: 0.85rem; line-height: 1.5; }
        .dm-msg.sent { align-self: flex-end; background: var(--accent); color: white; }
        .dm-msg.received { align-self: flex-start; background: var(--bg-primary); border: 1px solid var(--border); }
        .dm-msg-time { font-size: 0.65rem; opacity: 0.6; margin-top: 4px; }
        .dm-input-area { padding: 12px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
        .dm-input-area input { flex: 1; }
        /* Profile Modal */
        .profile-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 90; display: none; justify-content: center; align-items: center; }
        .profile-overlay.active { display: flex; }
        .profile-modal { width: 420px; max-width: 95vw; background: var(--bg-secondary); border: 2px solid var(--border); padding: 24px; }
        .profile-modal-avatar { width: 80px; height: 80px; border: 3px solid var(--accent); overflow: hidden; margin: 0 auto 12px; }
        .profile-modal-avatar img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-profile">
                <div class="sidebar-avatar" id="sidebarAvatar"><img src="/assets/avatars/default-avatar.svg" alt=""></div>
                <div class="sidebar-username" id="sidebarUsername">—</div>
                <div class="sidebar-title" id="sidebarTitle">Newbie</div>
                <div class="sidebar-stats">
                    <div class="stat"><div class="stat-value" id="sidebarLevel">1</div><div class="stat-label">LVL</div></div>
                    <div class="stat"><div class="stat-value" id="sidebarZen">0</div><div class="stat-label">Zen</div></div>
                    <div class="stat"><div class="stat-value" id="sidebarStreak">0</div><div class="stat-label">Streak</div></div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="/dashboard"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></span>Dashboard</a>
                <a href="/practice"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg></span>Practice</a>
                <a href="/profile"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>Profile</a>
                <a href="/leaderboard"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9H4a2 2 0 01-2-2V5a2 2 0 012-2h2m12 6h2a2 2 0 002-2V5a2 2 0 00-2-2h-2M9 22h6m-3-4v4m-4-8a4 4 0 004 4 4 4 0 004-4V3H8v11z"/></svg></span>Leaderboard</a>
                <a href="/shop"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg></span>Shop</a>
                <a href="/chat"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></span>Chat</a>
                <a href="/community" class="active"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg></span>Community</a>
                <a href="/docs"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="13" y2="17"/></svg></span>Python Docs</a>
                <a href="/rules"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg></span>Rules</a>
            </nav>
            <div class="sidebar-footer"><a href="#" onclick="logout();return false;" class="btn btn-ghost btn-sm w-full"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Logout</a></div>
        </aside>

        <main class="main-content">
            <div class="main-header">
                <h2>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
                    Community
                </h2>
                <div style="display:flex;gap:8px;align-items:center;">
                    <input type="text" id="searchInput" class="form-control" placeholder="Search users..." style="width:200px;font-size:0.82rem;">
                    <button class="btn btn-ghost btn-sm" onclick="showDMList()" id="dmBtn">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
                        Messages <span id="unreadBadge" class="badge" style="display:none;background:var(--error);color:white;font-size:0.65rem;padding:1px 5px;margin-left:4px;">0</span>
                    </button>
                </div>
            </div>

            <div class="community-grid stagger" id="communityGrid">
                <p class="text-muted text-sm">Loading community...</p>
            </div>
        </main>
    </div>

    <!-- DM Modal -->
    <div class="dm-overlay" id="dmOverlay">
        <div class="dm-container">
            <div class="dm-header">
                <button class="btn btn-ghost btn-sm" onclick="closeDM()" style="padding:4px;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
                <div class="dm-header-avatar" id="dmAvatar"><img src="/assets/avatars/default-avatar.svg" alt=""></div>
                <strong id="dmUsername" style="font-size:0.9rem;">—</strong>
            </div>
            <div class="dm-messages" id="dmMessages">
                <p class="text-muted text-sm" style="text-align:center;margin:auto;">Start a conversation</p>
            </div>
            <div class="dm-input-area">
                <input type="text" id="dmInput" class="form-control" placeholder="Type a message..." maxlength="500">
                <button class="btn btn-primary btn-sm" onclick="sendDM()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Profile Modal -->
    <div class="profile-overlay" id="profileOverlay" onclick="if(event.target===this)closeProfile()">
        <div class="profile-modal" id="profileModal"></div>
    </div>

    <div id="toastContainer" class="toast-container"></div>
    <script src="/js/icons.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/banner-sim.js"></script>
    <script src="/js/card-sim.js"></script>

    <script src="/js/community.js"></script>
</body>
</html>
