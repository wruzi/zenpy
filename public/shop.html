<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Shop — ZenPy</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/animations.css">
    <style>
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
        .item-card {
            background: var(--bg-card); border: 2px solid var(--border);
            padding: 20px; box-shadow: var(--shadow); transition: var(--transition);
            position: relative; text-align: center;
        }
        .item-card:hover { transform: translate(-2px, -2px); box-shadow: var(--shadow-lg); }
        .item-emoji { font-size: 2rem; margin-bottom: 8px; display: block; }
        .item-name { font-weight: 700; font-size: 0.9rem; margin-bottom: 4px; }
        .item-desc { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 8px; line-height: 1.5; }
        .item-price { font-size: 0.9rem; font-weight: 700; color: var(--warning); margin-bottom: 6px; display: flex; align-items: center; justify-content: center; gap: 4px; }
        .item-rarity { margin-bottom: 8px; }
        .item-req { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 8px; display: flex; align-items: center; justify-content: center; gap: 4px; }
        .owned-badge {
            position: absolute; top: 8px; right: 8px;
            font-size: 0.65rem; font-weight: 700;
            padding: 2px 6px; border: 1px solid var(--success); color: var(--success); text-transform: uppercase; letter-spacing: 0.1em;
        }
        .categories { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
        .category-btn {
            padding: 6px 14px; font-family: var(--font-main); font-size: 0.78rem;
            font-weight: 600; border: 1px solid var(--border); background: transparent;
            color: var(--text-muted); transition: var(--transition); text-transform: uppercase; letter-spacing: 0.04em;
        }
        .category-btn.active, .category-btn:hover { border-color: var(--accent); color: var(--accent); }
        .inv-item {
            display: inline-flex; flex-direction: column; align-items: center;
            padding: 12px; border: 1px solid var(--border); min-width: 100px; text-align: center; font-size: 0.82rem;
        }
        .inv-item.equipped { border-color: var(--accent); }
        .inv-emoji { font-size: 1.5rem; margin-bottom: 4px; }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-profile">
                <div class="sidebar-avatar" id="sidebarAvatar"><img src="/assets/images/default-avatar.png" alt=""></div>
                <div class="sidebar-username" id="sidebarUsername">—</div>
                <div class="sidebar-title" id="sidebarTitle">Newbie</div>
                <div class="sidebar-stats">
                    <div class="stat"><div class="stat-value" id="sidebarLevel">1</div><div class="stat-label">LVL</div></div>
                    <div class="stat"><div class="stat-value" id="sidebarZen">0</div><div class="stat-label">Zen</div></div>
                    <div class="stat"><div class="stat-value" id="sidebarStreak">0</div><div class="stat-label">Streak</div></div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="/dashboard"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></span>Dashboard</a>
                <a href="/practice"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg></span>Practice</a>
                <a href="/profile"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>Profile</a>
                <a href="/leaderboard"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9H4a2 2 0 01-2-2V5a2 2 0 012-2h2m12 6h2a2 2 0 002-2V5a2 2 0 00-2-2h-2M9 22h6m-3-4v4m-4-8a4 4 0 004 4 4 4 0 004-4V3H8v11z"/></svg></span>Leaderboard</a>
                <a href="/shop" class="active"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg></span>Shop</a>
                <a href="/chat"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></span>Chat</a>
                <a href="/community"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg></span>Community</a>
            </nav>
            <div class="sidebar-footer"><a href="#" onclick="logout();return false;" class="btn btn-ghost btn-sm w-full"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Logout</a></div>
        </aside>

        <main class="main-content">
            <div class="main-header">
                <h2>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
                    Zen Shop
                </h2>
                <div class="top-stat">
                    <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="var(--warning)" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M14.5 9h-3a1.5 1.5 0 000 3h1a1.5 1.5 0 010 3h-3m2-8v1m0 6v1"/></svg></span>
                    <span class="value" id="zenBalance">0</span> <span class="text-muted">Zen</span>
                </div>
            </div>

            <div class="categories">
                <button class="category-btn active" onclick="filterCategory('all')">All</button>
                <button class="category-btn" onclick="filterCategory('name_style')">Names</button>
                <button class="category-btn" onclick="filterCategory('avatar_frame')">Frames</button>
                <button class="category-btn" onclick="filterCategory('effect')">Effects</button>
                <button class="category-btn" onclick="filterCategory('name_accessory')">Titles</button>
                <button class="category-btn" onclick="filterCategory('chat_extra')">Chat</button>
            </div>

            <div class="shop-grid stagger" id="shopGrid">
                <p class="text-muted">Loading shop...</p>
            </div>

            <h3 class="mt-3 mb-2" style="font-size:1rem; display:flex; align-items:center; gap:6px;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/></svg>
                Your Inventory
            </h3>
            <div class="d-flex gap-1" style="flex-wrap:wrap;" id="inventoryGrid">
                <p class="text-muted text-sm">No items yet.</p>
            </div>
        </main>
    </div>

    <!-- Purchase Modal -->
    <div class="modal-overlay" id="purchaseModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Confirm Purchase</h3>
                <p id="purchaseDetails"></p>
            </div>
            <div class="d-flex gap-1">
                <button class="btn btn-primary" id="confirmPurchase">Buy Now</button>
                <button class="btn btn-ghost" onclick="closePurchaseModal()">Cancel</button>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>
    <script src="/js/icons.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/shop.js"></script>
</body>
</html>
