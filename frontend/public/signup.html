<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — ZenPy</title>
    <link rel="icon" type="image/svg+xml" href="/assets/images/favicon-z.svg">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/animations.css">
    <style>
        .auth-card { max-width: 440px; }
        .subtitle { margin-bottom: 18px; }
        .auth-divider {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-muted);
            font-size: 0.75rem;
            margin: 20px 0 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 2px;
            background: var(--border);
        }
        .oauth-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 14px;
            margin-top: 16px;
            font-family: var(--font-main);
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            border: 2px solid var(--accent);
            color: white;
            background: var(--accent);
            text-decoration: none;
            box-shadow: var(--shadow-accent);
        }
        .oauth-btn:hover {
            transform: translate(-2px, -2px);
        }
        .otp-actions { display: flex; gap: 10px; margin-top: 8px; }
        .otp-actions .btn { flex: 1; }
        .muted-link { font-size: 0.8rem; color: var(--text-muted); margin-top: 8px; display: inline-block; }
        .loading-screen {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            z-index: 5000;
        }
        .loading-screen.show { display: flex; animation: fadeIn 0.25s ease; }
        .loading-box {
            border: 2px solid var(--accent);
            padding: 20px 26px;
            box-shadow: var(--shadow-accent);
            text-align: center;
            min-width: 280px;
            background: var(--bg-card);
        }
        .loading-bar {
            margin-top: 14px;
            height: 8px;
            border: 2px solid var(--border);
            background: var(--bg-primary);
            overflow: hidden;
        }
        .loading-bar span {
            display: block;
            width: 0%;
            height: 100%;
            background: var(--accent);
            animation: loadDash 0.8s ease forwards;
        }
        @keyframes loadDash {
            from { width: 0%; }
            to { width: 100%; }
        }
    </style>
</head>
<body>
    <nav class="nav-header">
        <a href="/" class="nav-logo">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FF1493" stroke-width="2.5"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
            Zen<span>Py</span>
        </a>
        <div class="nav-links">
            <a href="/login" class="btn btn-ghost btn-sm">Login</a>
            <a href="/signup" class="btn btn-primary btn-sm">Sign Up</a>
        </div>
    </nav>

    <div class="auth-page">
        <div class="auth-card animate-fadeInUp">
            <h2>Create your account</h2>
            <p class="subtitle" style="color: var(--text-muted);">Verify your email with OTP, then start coding.</p>

            <div id="signupError" class="form-error hidden mb-2"></div>

            <form id="signupForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input id="username" class="form-control" maxlength="20" required placeholder="your_username">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input id="email" type="email" class="form-control" required placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input id="password" type="password" class="form-control" minlength="6" required placeholder="At least 6 characters">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input id="confirmPassword" type="password" class="form-control" minlength="6" required placeholder="Repeat your password">
                </div>
                <button type="submit" id="requestOtpBtn" class="btn btn-primary w-full">Send OTP</button>
            </form>

            <div id="otpPanel" class="hidden mt-2">
                <div id="otpDevHint" class="hidden mb-2" style="border:2px solid var(--warning);padding:10px;color:var(--warning);font-size:0.82rem;"></div>
                <div class="form-group">
                    <label for="otpCode">Enter OTP</label>
                    <input id="otpCode" class="form-control" maxlength="6" placeholder="6-digit code" style="letter-spacing:0.18em; text-align:center;">
                </div>
                <div class="otp-actions">
                    <button type="button" id="verifyOtpBtn" class="btn btn-primary">Verify & Continue</button>
                    <button type="button" id="resendOtpBtn" class="btn btn-secondary">Resend OTP</button>
                </div>
            </div>

            <div class="auth-divider">Or continue with</div>
            <a href="/auth/github" class="oauth-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .3a12 12 0 00-3.8 23.4c.6.1.8-.3.8-.6v-2c-3.3.7-4-1.6-4-1.6-.5-1.4-1.3-1.8-1.3-1.8-1.1-.7.1-.7.1-.7 1.2.1 1.9 1.3 1.9 1.3 1.1 1.9 2.9 1.3 3.6 1 .1-.8.4-1.3.8-1.6-2.7-.3-5.5-1.3-5.5-5.9 0-1.3.5-2.4 1.3-3.2-.1-.3-.6-1.5.1-3.2 0 0 1-.3 3.3 1.2 1-.3 2-.4 3-.4s2 .1 3 .4c2.3-1.6 3.3-1.2 3.3-1.2.7 1.7.2 2.9.1 3.2.8.8 1.3 1.9 1.3 3.2 0 4.6-2.8 5.6-5.5 5.9.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6A12 12 0 0012 .3z"/></svg>
                Continue with GitHub
            </a>
            <a class="muted-link" href="/login">Already have an account? Login</a>
        </div>
    </div>

    <div id="loadingScreen" class="loading-screen">
        <div class="loading-box animate-fadeInUp">
            <h3 style="margin:0; color:var(--accent);">Entering Dashboard</h3>
            <p style="margin:6px 0 0 0; color:var(--text-muted);">Setting up your ZenPy session...</p>
            <div class="loading-bar"><span></span></div>
        </div>
    </div>

    <script src="/js/utils.js"></script>
    <script>
        const els = {
            signupForm: document.getElementById('signupForm'),
            username: document.getElementById('username'),
            email: document.getElementById('email'),
            password: document.getElementById('password'),
            confirmPassword: document.getElementById('confirmPassword'),
            requestOtpBtn: document.getElementById('requestOtpBtn'),
            otpPanel: document.getElementById('otpPanel'),
            otpDevHint: document.getElementById('otpDevHint'),
            otpCode: document.getElementById('otpCode'),
            verifyOtpBtn: document.getElementById('verifyOtpBtn'),
            resendOtpBtn: document.getElementById('resendOtpBtn'),
            signupError: document.getElementById('signupError'),
            loadingScreen: document.getElementById('loadingScreen')
        };

        const RESEND_COOLDOWN_SECONDS = 180;
        const RESEND_MAX_TRIES = 2;
        let resendAttempts = 0;
        let resendCooldownInterval = null;

        function setError(message = '') {
            if (!message) {
                els.signupError.classList.add('hidden');
                els.signupError.textContent = '';
                return;
            }
            els.signupError.textContent = message;
            els.signupError.classList.remove('hidden');
        }

        function setOtpDevHint(message = '') {
            if (!message) {
                els.otpDevHint.classList.add('hidden');
                els.otpDevHint.textContent = '';
                return;
            }
            els.otpDevHint.textContent = message;
            els.otpDevHint.classList.remove('hidden');
        }

        function launchDashboardTransition() {
            els.loadingScreen.classList.add('show');
            setTimeout(() => {
                window.location.href = '/dashboard';
            }, 700);
        }

        function clearResendCooldown() {
            if (resendCooldownInterval) {
                clearInterval(resendCooldownInterval);
                resendCooldownInterval = null;
            }
        }

        function startResendCooldown(seconds = RESEND_COOLDOWN_SECONDS) {
            clearResendCooldown();

            let remaining = Number(seconds) || RESEND_COOLDOWN_SECONDS;
            els.resendOtpBtn.disabled = true;

            const tick = () => {
                const min = Math.floor(remaining / 60);
                const sec = remaining % 60;
                els.resendOtpBtn.textContent = `Resend in ${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;

                if (remaining <= 0) {
                    clearResendCooldown();
                    if (resendAttempts >= RESEND_MAX_TRIES) {
                        els.resendOtpBtn.disabled = true;
                        els.resendOtpBtn.textContent = 'Resend Locked';
                        setError('Try again later.');
                    } else {
                        els.resendOtpBtn.disabled = false;
                        els.resendOtpBtn.textContent = 'Resend OTP';
                    }
                    return;
                }

                remaining -= 1;
            };

            tick();
            resendCooldownInterval = setInterval(tick, 1000);
        }

        async function validateAuthToken() {
            const token = getToken();
            if (!token) return;

            try {
                const response = await fetch('/api/user', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if (response.ok) {
                    window.location.href = '/dashboard';
                    return;
                }
            } catch (error) {
                console.error('auth check failed', error);
            }

            removeToken();
            localStorage.removeItem('zenpy_user');
        }

        els.signupForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            setError();

            const username = els.username.value.trim();
            const email = els.email.value.trim().toLowerCase();
            const password = els.password.value;
            const confirmPassword = els.confirmPassword.value;

            if (password !== confirmPassword) {
                setError('Passwords do not match.');
                return;
            }

            els.requestOtpBtn.disabled = true;
            els.requestOtpBtn.textContent = 'Sending OTP...';

            try {
                const response = await fetch('/api/auth/signup/request-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                const data = await response.json();

                if (!response.ok || !data.success) {
                    setError(data.message || 'Unable to send OTP.');
                    return;
                }

                els.otpPanel.classList.remove('hidden');
                setOtpDevHint('');

                if (data.delivery === 'fallback' && data.otp) {
                    setOtpDevHint(`DEV OTP FALLBACK: ${data.otp}`);
                    showToast('Email failed; using development OTP fallback.', 'warning');
                }

                resendAttempts = 0;
                clearResendCooldown();
                els.resendOtpBtn.disabled = false;
                els.resendOtpBtn.textContent = 'Resend OTP';
                showToast('OTP sent to your email.', 'success');
            } catch (error) {
                setError('Network error while sending OTP.');
            } finally {
                els.requestOtpBtn.disabled = false;
                els.requestOtpBtn.textContent = 'Send OTP';
            }
        });

        els.verifyOtpBtn.addEventListener('click', async () => {
            setError();
            const email = els.email.value.trim().toLowerCase();
            const otp = els.otpCode.value.trim();

            if (otp.length !== 6) {
                setError('Enter the 6-digit OTP.');
                return;
            }

            els.verifyOtpBtn.disabled = true;
            els.verifyOtpBtn.textContent = 'Verifying...';

            try {
                const response = await fetch('/api/auth/signup/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp })
                });
                const data = await response.json();

                if (!response.ok || !data.success) {
                    setError(data.message || 'OTP verification failed.');
                    return;
                }

                setToken(data.token);
                localStorage.setItem('zenpy_user', JSON.stringify(data.user));
                launchDashboardTransition();
            } catch (error) {
                setError('Network error while verifying OTP.');
            } finally {
                els.verifyOtpBtn.disabled = false;
                els.verifyOtpBtn.textContent = 'Verify & Continue';
            }
        });

        els.resendOtpBtn.addEventListener('click', async () => {
            setError();
            const email = els.email.value.trim().toLowerCase();
            if (!email) {
                setError('Enter email first.');
                return;
            }

            if (resendAttempts >= RESEND_MAX_TRIES) {
                els.resendOtpBtn.disabled = true;
                els.resendOtpBtn.textContent = 'Resend Locked';
                setError('Try again later.');
                return;
            }

            els.resendOtpBtn.disabled = true;
            els.resendOtpBtn.textContent = 'Resending...';

            try {
                const response = await fetch('/api/auth/signup/resend-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await response.json();

                if (!response.ok || !data.success) {
                    setError(data.message || 'Could not resend OTP.');
                    return;
                }

                if (data.delivery === 'fallback' && data.otp) {
                    setOtpDevHint(`DEV OTP FALLBACK: ${data.otp}`);
                    showToast('Email failed; using development OTP fallback.', 'warning');
                }

                resendAttempts += 1;
                showToast('OTP resent to your email.', 'info');

                if (resendAttempts >= RESEND_MAX_TRIES) {
                    els.resendOtpBtn.disabled = true;
                    els.resendOtpBtn.textContent = 'Resend Locked';
                    setError('Try again later.');
                } else {
                    startResendCooldown(RESEND_COOLDOWN_SECONDS);
                }
            } catch (error) {
                setError('Network error while resending OTP.');
            } finally {
                if (!resendCooldownInterval && resendAttempts < RESEND_MAX_TRIES) {
                    els.resendOtpBtn.disabled = false;
                    els.resendOtpBtn.textContent = 'Resend OTP';
                }
            }
        });

        document.addEventListener('DOMContentLoaded', validateAuthToken);
    </script>
</body>
</html>
