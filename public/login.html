<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — ZenPy</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/animations.css">
    <style>
        .auth-card { max-width: 440px; }
        .subtitle { margin-bottom: 18px; }
        .auth-divider {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-muted);
            font-size: 0.75rem;
            margin: 20px 0 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 2px;
            background: var(--border);
        }
        .oauth-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            font-family: var(--font-main);
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            border: 2px solid var(--accent);
            color: white;
            background: var(--accent);
            text-decoration: none;
            box-shadow: var(--shadow-accent);
        }
        .oauth-btn:hover {
            transform: translate(-2px, -2px);
        }
        .muted-link { font-size: 0.8rem; color: var(--text-muted); margin-top: 8px; display: inline-block; }
        .loading-screen {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            z-index: 5000;
        }
        .loading-screen.show { display: flex; animation: fadeIn 0.25s ease; }
        .loading-box {
            border: 2px solid var(--accent);
            padding: 20px 26px;
            box-shadow: var(--shadow-accent);
            text-align: center;
            min-width: 280px;
            background: var(--bg-card);
        }
        .loading-bar {
            margin-top: 14px;
            height: 8px;
            border: 2px solid var(--border);
            background: var(--bg-primary);
            overflow: hidden;
        }
        .loading-bar span {
            display: block;
            width: 0%;
            height: 100%;
            background: var(--accent);
            animation: loadDash 0.8s ease forwards;
        }
        @keyframes loadDash {
            from { width: 0%; }
            to { width: 100%; }
        }
    </style>
</head>
<body>
    <nav class="nav-header">
        <a href="/" class="nav-logo">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FF1493" stroke-width="2.5"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
            Zen<span>Py</span>
        </a>
    </nav>

    <div class="auth-page">
        <div class="auth-card animate-fadeInUp">
            <h2>Welcome back</h2>
            <p class="subtitle" style="color: var(--text-muted)">Login with your email/password or continue with GitHub.</p>

            <div id="loginError" class="form-error hidden mb-2"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input id="email" type="email" class="form-control" required placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input id="password" type="password" class="form-control" required placeholder="Your password">
                </div>
                <button type="submit" id="loginBtn" class="btn btn-primary w-full">Login</button>
            </form>

            <div class="auth-divider">Or continue with</div>

            <a href="/auth/github" class="oauth-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .3a12 12 0 00-3.8 23.4c.6.1.8-.3.8-.6v-2c-3.3.7-4-1.6-4-1.6-.5-1.4-1.3-1.8-1.3-1.8-1.1-.7.1-.7.1-.7 1.2.1 1.9 1.3 1.9 1.3 1.1 1.9 2.9 1.3 3.6 1 .1-.8.4-1.3.8-1.6-2.7-.3-5.5-1.3-5.5-5.9 0-1.3.5-2.4 1.3-3.2-.1-.3-.6-1.5.1-3.2 0 0 1-.3 3.3 1.2 1-.3 2-.4 3-.4s2 .1 3 .4c2.3-1.6 3.3-1.2 3.3-1.2.7 1.7.2 2.9.1 3.2.8.8 1.3 1.9 1.3 3.2 0 4.6-2.8 5.6-5.5 5.9.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6A12 12 0 0012 .3z"/></svg>
                Continue with GitHub
            </a>
            <a class="muted-link" href="/signup">New here? Create account</a>
        </div>
    </div>

    <div id="loadingScreen" class="loading-screen">
        <div class="loading-box animate-fadeInUp">
            <h3 style="margin:0; color:var(--accent);">Entering Dashboard</h3>
            <p style="margin:6px 0 0 0; color:var(--text-muted);">Verifying your session...</p>
            <div class="loading-bar"><span></span></div>
        </div>
    </div>

    <script src="/js/utils.js"></script>
    <script>
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const loginError = document.getElementById('loginError');
        const loadingScreen = document.getElementById('loadingScreen');

        function setLoginError(message = '') {
            if (!message) {
                loginError.classList.add('hidden');
                loginError.textContent = '';
                return;
            }
            loginError.textContent = message;
            loginError.classList.remove('hidden');
        }

        function launchDashboardTransition() {
            loadingScreen.classList.add('show');
            setTimeout(() => {
                window.location.href = '/dashboard';
            }, 700);
        }

        async function validateAuthToken() {
            const token = getToken();
            if (!token) return;

            try {
                const response = await fetch('/api/user', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if (response.ok) {
                    window.location.href = '/dashboard';
                    return;
                }
            } catch (error) {
                console.error('auth check failed', error);
            }

            removeToken();
            localStorage.removeItem('zenpy_user');
        }

        loginForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            setLoginError();

            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;

            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                if (!response.ok || !data.success) {
                    setLoginError(data.message || 'Login failed.');
                    return;
                }

                setToken(data.token);
                localStorage.setItem('zenpy_user', JSON.stringify(data.user));
                launchDashboardTransition();
            } catch (error) {
                setLoginError('Network error. Please try again.');
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login';
            }
        });

        document.addEventListener('DOMContentLoaded', validateAuthToken);
    </script>
</body>
</html>
