<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice — ZenPy</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/animations.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
    <style>
        body { overflow: hidden; }

        .practice-layout {
            display: grid;
            grid-template-columns: 340px 1fr 340px;
            height: 100vh;
            gap: 0;
        }

        .panel {
            display: flex;
            flex-direction: column;
            border-right: 2px solid var(--border);
            overflow-y: auto;
        }
        .panel:last-child { border-right: none; }

        .panel-header {
            padding: 12px 16px;
            border-bottom: 2px solid var(--border);
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .panel-header h3 {
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .panel-body { flex: 1; padding: 16px; overflow-y: auto; }

        /* Question panel */
        .q-difficulty {
            display: inline-block;
            padding: 2px 10px;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            border: 1px solid;
        }
        .q-difficulty.beginner { color: var(--success); border-color: var(--success); }
        .q-difficulty.intermediate { color: var(--warning); border-color: var(--warning); }
        .q-difficulty.advanced { color: var(--error); border-color: var(--error); }

        .q-concept {
            display: inline-block;
            padding: 2px 8px;
            font-size: 0.72rem;
            border: 1px solid var(--border);
            color: var(--text-muted);
            margin: 2px;
        }

        .q-nav { display: flex; flex-wrap: wrap; gap: 4px; padding: 12px 16px; border-top: 2px solid var(--border); }
        .q-nav-btn {
            width: 28px; height: 28px;
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-main);
            font-size: 0.72rem; font-weight: 700;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-muted);
            transition: var(--transition);
        }
        .q-nav-btn.current { border-color: var(--accent); color: var(--accent); }
        .q-nav-btn.completed { background: var(--success); color: var(--bg-primary); border-color: var(--success); }
        .q-nav-btn.locked { opacity: 0.3; }

        /* Editor panel */
        .panel-editor { position: relative; }
        .CodeMirror { height: 100% !important; font-family: var(--font-code) !important; font-size: 0.88rem !important; }

        .anti-copy-banner {
            display: none;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: var(--bg-card);
            border: 2px solid var(--error);
            padding: 16px 24px;
            z-index: 100;
            text-align: center;
            font-size: 0.85rem;
            color: var(--error);
        }

        .editor-toolbar {
            display: flex;
            gap: 8px;
            padding: 10px 16px;
            border-top: 2px solid var(--border);
            background: var(--bg-secondary);
        }

        /* Output panel */
        .console-output {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            padding: 12px;
            font-family: var(--font-code);
            font-size: 0.82rem;
            min-height: 120px;
            white-space: pre-wrap;
            color: var(--text-secondary);
        }

        .test-case {
            display: flex; align-items: flex-start; gap: 8px;
            padding: 10px; border: 1px solid var(--border); margin-bottom: 6px;
        }
        .test-case.passed { border-color: var(--success); }
        .test-case.failed { border-color: var(--error); }
        .test-icon { display: flex; width: 16px; height: 16px; flex-shrink: 0; }
        .test-icon svg { width: 100%; height: 100%; }
        .test-details { font-size: 0.78rem; color: var(--text-muted); margin-top: 4px; font-family: var(--font-code); }

        /* Hint */
        #hintContent { display: none; margin-top: 12px; padding: 12px; border: 1px dashed var(--border); font-size: 0.85rem; color: var(--text-secondary); }
        #hintContent.show { display: block; }

        /* Timer */
        .timer { font-size: 0.85rem; font-weight: 700; color: var(--text-secondary); display: flex; align-items: center; gap: 4px; }
        .timer.warning { color: var(--warning); }
        .timer.danger { color: var(--error); }

        /* Pyodide loading */
        #pyodideLoading {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 9999;
        }
        #pyodideLoading h3 { margin-bottom: 12px; }

        /* Confetti */
        #confettiCanvas {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none; z-index: 99999;
        }

        @media (max-width: 900px) {
            .practice-layout { grid-template-columns: 1fr; grid-template-rows: auto 1fr auto; }
        }
    </style>
</head>
<body>
    <!-- Pyodide Loading -->
    <div id="pyodideLoading">
        <h3>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" style="vertical-align:middle;margin-right:6px;"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
            Loading Python Compiler...
        </h3>
        <div class="spinner"></div>
        <p class="text-muted text-sm mt-2">Downloading Pyodide (WebAssembly)</p>
    </div>

    <canvas id="confettiCanvas"></canvas>

    <div class="practice-layout">
        <!-- Left: Question -->
        <div class="panel">
            <div class="panel-header">
                <h3>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                    <span id="questionTitle">Question</span>
                </h3>
                <div class="timer" id="timerDisplay">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    0:00
                </div>
            </div>
            <div class="panel-body">
                <div class="d-flex justify-between align-center mb-2">
                    <span class="q-difficulty" id="qDifficulty">—</span>
                    <span class="text-muted text-sm">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                        Optimal: <span id="optimalTime">—</span>s
                    </span>
                </div>
                <h3 style="font-size:1rem; margin-bottom:8px;"><span id="qNumber">Q1</span>: <span id="qTitle">—</span></h3>
                <div id="qDescription" class="mb-2" style="font-size:0.88rem; line-height:1.7; color:var(--text-secondary);"></div>
                <div id="qConcepts" class="mb-2"></div>
                <button class="btn btn-ghost btn-sm" onclick="toggleHint()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18h6m-5 4h4M12 2a7 7 0 00-3 13.33V17h6v-1.67A7 7 0 0012 2z"/></svg>
                    Show Hint
                </button>
                <div id="hintContent"></div>
                <div class="mt-2 text-sm text-muted">
                    Potential XP: <span class="text-accent font-bold" id="potentialXP">0</span>
                </div>
            </div>
            <div class="q-nav" id="questionNav"></div>
        </div>

        <!-- Center: Editor -->
        <div class="panel panel-editor">
            <div class="panel-header">
                <h3>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
                    Editor
                </h3>
                <button class="btn btn-ghost btn-sm" onclick="resetCode()">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
                    Reset
                </button>
            </div>
            <textarea id="codeEditor"></textarea>
            <div class="anti-copy-banner" id="antiCopyBanner">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--error)" stroke-width="2" style="display:block;margin:0 auto 6px;"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                Copy-paste is disabled. Write your own code.
            </div>
            <div class="editor-toolbar">
                <button class="btn btn-primary btn-sm" id="runBtn" onclick="runCode()">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    Run
                </button>
                <button class="btn btn-success btn-sm" id="submitBtn" onclick="submitCode()">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                    Submit
                </button>
                <a href="/dashboard" class="btn btn-ghost btn-sm" style="margin-left:auto;">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                    Back
                </a>
            </div>
        </div>

        <!-- Right: Output + Tests -->
        <div class="panel">
            <div class="panel-header">
                <h3>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
                    Output
                </h3>
            </div>
            <div class="panel-body">
                <h4 style="font-size:0.82rem; margin-bottom:8px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em;">Console</h4>
                <pre class="console-output" id="consoleOutput">Run your code to see output here...</pre>

                <h4 style="font-size:0.82rem; margin-top:20px; margin-bottom:8px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em;">Test Results</h4>
                <div id="testResults">
                    <p class="text-muted text-sm">Submit your code to run test cases.</p>
                </div>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
    <script src="/js/icons.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/gamification.js"></script>
    <script src="/js/compiler.js"></script>
</body>
</html>
