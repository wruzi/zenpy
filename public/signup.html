<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — ZenPy</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/animations.css">
    <style>
        .auth-card {
            max-width: 420px;
            margin: 100px auto;
            padding: 32px;
            border: 2px solid var(--border);
            border-radius: 16px;
            background: var(--bg-card);
            box-shadow: var(--shadow-lg);
        }
        .nav-header {
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav-links {
            display: flex;
            gap: 8px;
        }
        .oauth-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 14px;
            margin-top: 16px;
            border-radius: 12px;
            font-family: 'Fredoka', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
            color: white;
            background: var(--primary);
            text-decoration: none;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.1);
        }
        .oauth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 6px 6px 0 rgba(0,0,0,0.15);
        }
        .oauth-btn:active {
            transform: translateY(2px);
            box-shadow: 2px 2px 0 rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>
    <nav class="nav-header">
        <a href="/" class="nav-logo">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FF1493" stroke-width="2.5"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
            Zen<span>Py</span>
        </a>
        <div class="nav-links">
            <a href="/login" class="btn btn-ghost btn-sm">Login</a>
            <a href="/signup" class="btn btn-primary btn-sm">Sign Up</a>
        </div>
    </nav>

    <div class="auth-page">
        <div class="auth-card animate-fadeInUp" style="text-align:center;">
            <h2>Sign Up with GitHub</h2>
            <p class="subtitle mb-5" style="color: var(--text-muted);">We only support GitHub OAuth for now. Authorize to keep learning.</p>
            <a href="/auth/github" class="oauth-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .3a12 12 0 00-3.8 23.4c.6.1.8-.3.8-.6v-2c-3.3.7-4-1.6-4-1.6-.5-1.4-1.3-1.8-1.3-1.8-1.1-.7.1-.7.1-.7 1.2.1 1.9 1.3 1.9 1.3 1.1 1.9 2.9 1.3 3.6 1 .1-.8.4-1.3.8-1.6-2.7-.3-5.5-1.3-5.5-5.9 0-1.3.5-2.4 1.3-3.2-.1-.3-.6-1.5.1-3.2 0 0 1-.3 3.3 1.2 1-.3 2-.4 3-.4s2 .1 3 .4c2.3-1.6 3.3-1.2 3.3-1.2.7 1.7.2 2.9.1 3.2.8.8 1.3 1.9 1.3 3.2 0 4.6-2.8 5.6-5.5 5.9.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6A12 12 0 0012 .3z"/></svg>
                Continue with GitHub
            </a>
        </div>
    </div>

    <script src="/js/utils.js"></script>
    <script>
        async function validateAuthToken() {
            const token = getToken();
            if (!token) return;

            try {
                const response = await fetch('/api/user', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if (response.ok) {
                    window.location.href = '/dashboard';
                    return;
                }
            } catch (error) {
                console.error('auth check failed', error);
            }

            removeToken();
            localStorage.removeItem('zenpy_user');
        }

        document.addEventListener('DOMContentLoaded', validateAuthToken);
    </script>
</body>
</html>
