<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — ZenPy</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/animations.css">
</head>
<body>
    <nav class="nav-header">
        <a href="/" class="nav-logo">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FF1493" stroke-width="2.5"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
            Zen<span>Py</span>
        </a>
        <div class="nav-links">
            <a href="/signup" class="btn btn-ghost btn-sm">Sign Up</a>
        </div>
    </nav>

    <div class="auth-page">
        <div class="auth-card animate-fadeInUp">
            <h2>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" style="vertical-align:middle;margin-right:6px;"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.778 7.778 5.5 5.5 0 017.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
                Login
            </h2>
            <p class="subtitle">Welcome back, coder.</p>

            <div id="errorMsg" class="form-error hidden mb-2"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="form-control" placeholder="your password" required>
                </div>
                <div class="d-flex justify-between align-center mb-2" style="font-size:0.82rem;">
                    <label class="d-flex align-center gap-1" style="color:var(--text-muted);">
                        <input type="checkbox" id="rememberMe"> Remember me
                    </label>
                    <a href="/forgot-password">Forgot password?</a>
                </div>
                <button type="submit" id="loginBtn" class="btn btn-primary w-full">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Login
                </button>
            </form>

            <p class="form-footer">
                Don't have an account? <a href="/signup">Sign up</a>
            </p>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>
    <script src="/js/utils.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
