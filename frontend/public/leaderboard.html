<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard — ZenPy</title>
    <link rel="icon" type="image/svg+xml" href="/assets/images/favicon-z.svg">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/animations.css">
    <style>
        .table-container {
            position: relative;
            overflow: hidden;
            transition: opacity .2s ease, transform .2s ease;
        }
        .table-container.table-switching {
            opacity: .6;
            transform: translateY(4px);
        }
        #tableBody .leader-row {
            cursor: pointer;
            opacity: 0;
            animation: leader-enter .34s ease forwards;
            transition: transform .16s ease, background .16s ease, box-shadow .16s ease;
        }
        #tableBody .leader-row:hover {
            transform: translateX(6px);
            background: var(--accent-dim);
        }
        #tableBody .leader-row.spotlight {
            background: var(--accent-dim);
            box-shadow: inset 3px 0 0 var(--accent);
        }
        #tableBody .leader-row.rank-1 td:first-child svg,
        #tableBody .leader-row.rank-2 td:first-child svg,
        #tableBody .leader-row.rank-3 td:first-child svg {
            animation: rank-pulse 2.1s ease-in-out infinite;
        }
        #tableBody .leader-row.rank-1 { box-shadow: inset 2px 0 0 var(--warning); }
        #tableBody .leader-row.rank-2 { box-shadow: inset 2px 0 0 var(--text-muted); }
        #tableBody .leader-row.rank-3 { box-shadow: inset 2px 0 0 var(--border); }

        @keyframes leader-enter {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes rank-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-profile">
                <div class="sidebar-avatar" id="sidebarAvatar"><img src="/assets/avatars/default-avatar.svg" alt=""></div>
                <div class="sidebar-username" id="sidebarUsername">—</div>
                <div class="sidebar-title" id="sidebarTitle">Newbie</div>
                <div class="sidebar-stats">
                    <div class="stat"><div class="stat-value" id="sidebarLevel">1</div><div class="stat-label">LVL</div></div>
                    <div class="stat"><div class="stat-value" id="sidebarZen">0</div><div class="stat-label">Zen</div></div>
                    <div class="stat"><div class="stat-value" id="sidebarStreak">0</div><div class="stat-label">Streak</div></div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="/dashboard"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></span>Dashboard</a>
                <a href="/practice"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg></span>Practice</a>
                <a href="/profile"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>Profile</a>
                <a href="/leaderboard" class="active"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9H4a2 2 0 01-2-2V5a2 2 0 012-2h2m12 6h2a2 2 0 002-2V5a2 2 0 00-2-2h-2M9 22h6m-3-4v4m-4-8a4 4 0 004 4 4 4 0 004-4V3H8v11z"/></svg></span>Leaderboard</a>
                <a href="/shop"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg></span>Shop</a>
                <a href="/chat"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></span>Chat</a>
                <a href="/community"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg></span>Community</a>
                <a href="/docs"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="13" y2="17"/></svg></span>Python Docs</a>
                <a href="/rules"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg></span>Rules</a>
            </nav>
            <div class="sidebar-footer"><a href="#" onclick="logout();return false;" class="btn btn-ghost btn-sm w-full"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Logout</a></div>
        </aside>

        <main class="main-content">
            <div class="main-header">
                <h2><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><path d="M6 9H4a2 2 0 01-2-2V5a2 2 0 012-2h2m12 6h2a2 2 0 002-2V5a2 2 0 00-2-2h-2M9 22h6m-3-4v4m-4-8a4 4 0 004 4 4 4 0 004-4V3H8v11z"/></svg>Leaderboard</h2>
            </div>

            <div class="tabs">
                <button class="tab active" onclick="switchTab('progression')">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="12" width="4" height="8"/><rect x="10" y="8" width="4" height="12"/><rect x="17" y="4" width="4" height="16"/></svg>
                    Progression
                </button>
                <button class="tab" onclick="switchTab('speed')">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                    Speed
                </button>
                <button class="tab" onclick="switchTab('xp')">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                    XP
                </button>
                <button class="tab" onclick="switchTab('zen')">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M14.5 9h-3a1.5 1.5 0 000 3h1a1.5 1.5 0 010 3h-3m2-8v1m0 6v1"/></svg>
                    Zen
                </button>
            </div>

            <div class="card">
                <div class="table-container">
                    <table>
                        <thead id="tableHead"><tr><th>#</th><th>User</th><th>Question</th><th>Completed</th><th>Total Time</th></tr></thead>
                        <tbody id="tableBody"><tr><td colspan="5" class="text-center text-muted p-3">Loading...</td></tr></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="toastContainer" class="toast-container"></div>
    <script src="/js/icons.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/leaderboard.js"></script>
</body>
</html>
